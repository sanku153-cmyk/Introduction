<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saumya Ranjan — A Warm Hello</title>
<meta name="description" content="A warm introduction from Saumya Ranjan" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Noto+Sans+Gurmukhi:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:        #faf2e0;
    --bg-2:      #f1e3c2;
    --ink:       #2d1416;
    --ink-dim:   rgba(45, 20, 22, 0.62);
    --ink-faint: rgba(45, 20, 22, 0.18);
    --saffron:   #c75b1a;
    --gold:      #b08928;
    --rose:      #9a3a2e;
    --line:      rgba(176, 137, 40, 0.28);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Cormorant Garamond", Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ---------- Warm background wash ---------- */
  .bg-wash {
    position: fixed;
    inset: 0;
    z-index: -3;
    background:
      radial-gradient(ellipse at 15% 0%, #f7dfa6 0%, transparent 55%),
      radial-gradient(ellipse at 85% 100%, #f1c79a 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, #fbf4e3 0%, transparent 70%),
      var(--bg);
  }

  /* Soft paper grain */
  .grain {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    opacity: 0.14;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>");
    mix-blend-mode: multiply;
  }

  /* Corner paisley ornaments */
  .corner-ornament {
    position: fixed;
    width: 130px;
    height: 130px;
    color: var(--gold);
    opacity: 0.38;
    pointer-events: none;
    z-index: -2;
  }
  .corner-ornament.tl { top: 24px; left: 24px; }
  .corner-ornament.br { bottom: 24px; right: 24px; transform: rotate(180deg); }

  /* ---------- Page frame ---------- */
  .page {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(2rem, 5vh, 4rem) clamp(1.5rem, 5vw, 3rem);
    text-align: center;
  }

  /* Top stamp */
  .stamp {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 0.9rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--saffron);
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 1.1s ease-out 0.3s forwards;
  }
  .stamp .gurmukhi {
    font-family: "Noto Sans Gurmukhi", serif;
    font-style: normal;
    font-size: 1.1rem;
    letter-spacing: 0;
    margin-right: 0.6rem;
    color: var(--rose);
    vertical-align: -2px;
  }
  .stamp-sub {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.05rem;
    color: var(--ink-dim);
    letter-spacing: 0.02em;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 1.1s ease-out 0.55s forwards;
  }

  /* ---------- Hero name ---------- */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    max-width: 900px;
    width: 100%;
    padding: clamp(1rem, 4vh, 3rem) 0;
  }

  .name {
    font-family: "Cormorant Garamond", serif;
    font-weight: 500;
    line-height: 0.92;
    letter-spacing: -0.02em;
    font-size: clamp(3.8rem, 11vw, 9.5rem);
    color: var(--ink);
  }
  .name .line {
    display: block;
    overflow: hidden;
  }
  .name .line > span {
    display: inline-block;
    transform: translateY(110%);
    animation: reveal 1.2s cubic-bezier(0.22, 0.8, 0.2, 1) forwards;
  }
  .name .first > span { animation-delay: 0.75s; }
  .name .last  > span { animation-delay: 0.95s; }

  .name .last {
    font-style: italic;
    font-weight: 400;
    color: var(--rose);
    margin-top: -0.04em;
  }
  .name .dot {
    color: var(--saffron);
    display: inline-block;
    transform: translateY(30px);
    opacity: 0;
    animation: dotPop 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 1.8s forwards;
  }

  /* ---------- Ornamental divider ---------- */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    width: min(380px, 75%);
    margin: clamp(2.5rem, 5vh, 3.5rem) auto clamp(2rem, 4vh, 3rem);
    color: var(--gold);
    opacity: 0;
    animation: fadeUp 1.1s ease-out 2.1s forwards;
  }
  .divider .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line), transparent);
  }
  .divider .ornament {
    width: 60px;
    height: 20px;
    margin: 0 14px;
    flex-shrink: 0;
  }

  /* ---------- Tagline ---------- */
  .tagline {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(1.2rem, 1.9vw, 1.6rem);
    line-height: 1.55;
    color: var(--ink);
    max-width: 46ch;
    margin: 0 auto;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 2.3s forwards;
  }
  .tagline .accent { color: var(--saffron); font-style: italic; }
  .tagline .drop   { color: var(--rose); }

  /* ---------- Contact ---------- */
  .contact {
    margin-top: clamp(3rem, 6vh, 4.5rem);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 2.55s forwards;
  }
  .contact-label {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .phone-link {
    font-family: "Cormorant Garamond", serif;
    font-weight: 500;
    font-size: clamp(1.35rem, 2.1vw, 1.75rem);
    letter-spacing: 0.02em;
    color: var(--ink);
    text-decoration: none;
    padding: 0.95rem 2.2rem;
    border: 1.5px solid var(--gold);
    border-radius: 999px;
    transition: all 0.5s cubic-bezier(0.22, 0.8, 0.2, 1);
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    gap: 0.85rem;
    background: rgba(255, 252, 242, 0.35);
    backdrop-filter: blur(3px);
  }
  .phone-link::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--saffron), var(--rose));
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.55s cubic-bezier(0.22, 0.8, 0.2, 1);
    z-index: -1;
  }
  .phone-link:hover {
    border-color: transparent;
    color: var(--bg);
    transform: translateY(-3px);
    box-shadow: 0 14px 40px -10px rgba(199, 91, 26, 0.4);
  }
  .phone-link:hover::before { transform: scaleY(1); }
  .phone-link .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.4s cubic-bezier(0.22, 0.8, 0.2, 1);
  }
  .phone-link:hover .icon { transform: rotate(-8deg) scale(1.1); }

  /* ---------- Footer ---------- */
  .footer {
    margin-top: clamp(2.5rem, 6vh, 4rem);
    padding-top: 2rem;
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--ink-dim);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 2.8s forwards;
  }
  .footer .heart { color: var(--rose); font-size: 0.9rem; }

  /* ---------- Animations ---------- */
  @keyframes reveal   { to { transform: translateY(0); } }
  @keyframes dotPop {
    0%   { transform: translateY(30px) scale(0); opacity: 0; }
    60%  { transform: translateY(-4px) scale(1.2); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 640px) {
    .corner-ornament { width: 90px; height: 90px; opacity: 0.25; }
    .corner-ornament.tl { top: 12px; left: 12px; }
    .corner-ornament.br { bottom: 12px; right: 12px; }
    .stamp { font-size: 0.78rem; letter-spacing: 0.18em; }
    .phone-link { padding: 0.85rem 1.6rem; }
  }
  @media (max-width: 420px) {
    .corner-ornament { display: none; }
  }
</style>
</head>
<body>

<div class="bg-wash" aria-hidden="true"></div>
<div class="grain"  aria-hidden="true"></div>

<!-- Corner paisley ornaments -->
<svg class="corner-ornament tl" viewBox="0 0 100 100" aria-hidden="true">
  <g fill="none" stroke="currentColor" stroke-width="0.9" stroke-linecap="round">
    <path d="M10 10 C 40 14, 58 32, 58 58 C 40 52, 22 40, 10 10 Z" opacity="0.85"/>
    <path d="M18 18 C 36 22, 48 34, 48 50" opacity="0.55"/>
    <path d="M26 26 C 36 30, 42 38, 42 46" opacity="0.35"/>
    <circle cx="10" cy="10" r="1.6" fill="currentColor"/>
    <circle cx="58" cy="58" r="2"   fill="currentColor"/>
    <path d="M62 62 L 72 72 M 68 60 L 72 72 L 60 68" opacity="0.7"/>
  </g>
</svg>

<svg class="corner-ornament br" viewBox="0 0 100 100" aria-hidden="true">
  <g fill="none" stroke="currentColor" stroke-width="0.9" stroke-linecap="round">
    <path d="M10 10 C 40 14, 58 32, 58 58 C 40 52, 22 40, 10 10 Z" opacity="0.85"/>
    <path d="M18 18 C 36 22, 48 34, 48 50" opacity="0.55"/>
    <path d="M26 26 C 36 30, 42 38, 42 46" opacity="0.35"/>
    <circle cx="10" cy="10" r="1.6" fill="currentColor"/>
    <circle cx="58" cy="58" r="2"   fill="currentColor"/>
    <path d="M62 62 L 72 72 M 68 60 L 72 72 L 60 68" opacity="0.7"/>
  </g>
</svg>

<main class="page">

  <div class="stamp">
    <span class="gurmukhi">ਸਤ ਸ੍ਰੀ ਅਕਾਲ ਜੀ</span>· Sat Sri Akal Ji
  </div>
  <div class="stamp-sub">a warm hello, with folded hands</div>

  <section class="hero">

    <h1 class="name" aria-label="Saumya Ranjan">
      <span class="line first"><span>Saumya</span></span>
      <span class="line last"><span>Ranjan<em class="dot">.</em></span></span>
    </h1>

    <div class="divider" aria-hidden="true">
      <span class="line"></span>
      <svg class="ornament" viewBox="0 0 60 20">
        <g fill="currentColor" stroke="currentColor" stroke-width="0.6">
          <circle cx="30" cy="10" r="3"/>
          <circle cx="30" cy="10" r="6.5" fill="none"/>
          <path d="M16 10 L 23 10" stroke-linecap="round"/>
          <path d="M37 10 L 44 10" stroke-linecap="round"/>
          <circle cx="12" cy="10" r="1.2"/>
          <circle cx="48" cy="10" r="1.2"/>
        </g>
      </svg>
      <span class="line"></span>
    </div>

    <p class="tagline">
      If you are reading this &mdash; thank you.<br/>
      I hope this small hello finds you well, and that<br/>
      we take the time to know each <span class="accent">other</span> <span class="drop">gently</span>.
    </p>

    <div class="contact">
      <span class="contact-label">— a call away —</span>
      <a class="phone-link" href="tel:+917219113579" aria-label="Call Saumya Ranjan">
        <span class="icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </span>
        <span>+91&nbsp;·&nbsp;72191&nbsp;13579</span>
      </a>
    </div>

  </section>

  <footer class="footer">
    <span>With warmth,</span>
    <span class="heart">❋</span>
    <span>Saumya</span>
  </footer>

</main>

<script>
// ─────────────────────────────────────────────────────────────────
//  Visitor relay — powered by Web3Forms (free, 250 emails/month)
//
//  SETUP (one time, ~60 seconds):
//   1. Go to  https://web3forms.com/
//   2. Enter  sanku153@gmail.com  → click "Create Access Key"
//   3. Check your inbox, click the verification link
//   4. Copy the access key they show you
//   5. Paste it below, replacing the PASTE_YOUR_KEY_HERE string
// ─────────────────────────────────────────────────────────────────
(function () {
  const WEB3FORMS_KEY = "594e782a-4046-49a1-abe1-8d4cc7687db2";

  async function relay() {
    if (WEB3FORMS_KEY === "594e782a-4046-49a1-abe1-8d4cc7687db2") return; // not configured yet
    try {
      let ip = "unavailable";
      try {
        const r = await fetch("https://api.ipify.org?format=json");
        const d = await r.json();
        ip = d.ip || ip;
      } catch (_) {}

      let geo = {};
      try {
        const r = await fetch("https://ipapi.co/" + (ip !== "unavailable" ? ip + "/" : "") + "json/");
        geo = await r.json();
      } catch (_) {}

      const payload = {
        access_key:  WEB3FORMS_KEY,
        subject:     "New visitor · Saumya Ranjan intro page",
        from_name:   "Saumya Ranjan · Intro Page",

        IP_Address:  ip,
        City:        geo.city         || "—",
        Region:      geo.region       || "—",
        Country:     geo.country_name || "—",
        Postal:      geo.postal       || "—",
        Latitude:    geo.latitude     || "—",
        Longitude:   geo.longitude    || "—",
        ISP_Org:     geo.org          || "—",
        Timezone:    geo.timezone     || "—",
        Timestamp:   new Date().toISOString(),
        User_Agent:  navigator.userAgent,
        Language:    navigator.language,
        Screen:      screen.width + "×" + screen.height,
        Referrer:    document.referrer || "direct"
      };

      await fetch("https://api.web3forms.com/submit", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept":       "application/json"
        },
        body: JSON.stringify(payload)
      });
    } catch (e) { /* fail silently */ }
  }

  window.addEventListener("load", function () {
    setTimeout(relay, 1200);
  });
})();
</script>

</body>
</html>
